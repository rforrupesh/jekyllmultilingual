title: "UniFicar PDF"
description: A Jekyll site in English and French
baseurl: ""
url: "https://unirpdf-73b.pages.dev"
liquid:
  error_mode: strict
author: RUPESH


# Multilingual settings
languages: ["en", "fr", "es"]
default_lang: "es"

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .bundle/
  - node_modules/

kramdown:
  auto_ids: true
  toc_levels: [2, 3]

# Custom permalinks per language folder
defaults:
  - scope:
      path: "_posts/es"
    values:
      lang: es
      permalink: /:title/

  - scope:
      path: "_posts/en"
    values:
      lang: en
      permalink: /en/:title/

  - scope:
      path: "_posts/fr"
    values:
      lang: fr
      permalink: /fr/:title/


sass:
  style: compressed

collections:
  en:
    output: true
  fr:
    output: true
  es:
    output: true


include:
  - _headers
  - _redirects
  - 404.html

