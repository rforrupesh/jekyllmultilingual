title: My Multilingual Site
description: A Jekyll site in English and French
baseurl: "/jekyllmultilingual"
url: "https://rforrupesh.github.io"

# Multilingual settings
languages: ["en", "fr"]
default_lang: "en"

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
