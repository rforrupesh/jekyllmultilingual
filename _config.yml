title: "My Multilingual"
description: A Jekyll site in English and French
baseurl: "/jekyllmultilingual"
url: "https://rforrupesh.github.io"
author: lokesh
# twitter_username: yourhandle   # uncomment if you have one

# Multilingual settings
languages: ["en", "fr", "es"]
default_lang: "es"

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .bundle/

kramdown:
  auto_ids: true
  toc_levels: [2, 3]

# Custom permalinks per language folder
defaults:
  - scope:
      path: "_posts/es"
    values:
      permalink: /:title/

  - scope:
      path: "_posts/en"
    values:
      permalink: /en/:title/

  - scope:
      path: "_posts/fr"
    values:
      permalink: /fr/:title/
