<section class="splitpdf">
  <div class="container">
    <h1>{{ page.title }}</h1>
    <p class="tool-desc">{{ page.description }}</p>

    <div class="drop-zone" id="dropZone">
      <span>📄</span>
      <p>Drag & drop a PDF here or click to browse</p>
      <input type="file" id="fileInput" accept=".pdf" hidden />
      <button class="btn" onclick="document.getElementById('fileInput').click()">
        Select PDF
      </button>
    </div>

    <div id="options" style="display:none">
      <div class="split-options">
        <label class="option-label">
          <input type="radio" name="splitMode" value="all" checked />
          Split into individual pages
        </label>
        <label class="option-label">
          <input type="radio" name="splitMode" value="range" />
          Custom range (e.g. 1-3, 5, 7-9)
        </label>
        <input type="text" id="rangeInput" class="range-input" placeholder="e.g. 1-3, 5, 7-9" style="display:none" />
      </div>
      <p class="file-info" id="fileInfo"></p>
      <button class="btn btn-split" id="splitBtn">Split PDF</button>
    </div>
  </div>
</section>

<style>
.splitpdf { padding: 2rem 0; }
.splitpdf h1 { font-size: 1.9rem; font-weight: 800; margin-bottom: 0.5rem; }
.tool-desc { color: var(--muted); margin-bottom: 2rem; }
.drop-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 3rem 1.5rem; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: var(--surface); }
.drop-zone span { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
.drop-zone p { color: var(--muted); margin-bottom: 1rem; font-size: 0.9rem; }
.split-options { margin: 1.5rem 0 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
.option-label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; cursor: pointer; }
.range-input { border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 0.75rem; font-size: 0.9rem; width: 100%; max-width: 300px; margin-top: 0.25rem; }
.range-input:focus { outline: none; border-color: var(--accent); }
.file-info { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
.btn-split { width: 100%; padding: 0.75rem; font-size: 1rem; margin-top: 0.5rem; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const options = document.getElementById('options');
const fileInfo = document.getElementById('fileInfo');
const splitBtn = document.getElementById('splitBtn');
const rangeInput = document.getElementById('rangeInput');
let pdfFile = null;

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));

document.querySelectorAll('input[name="splitMode"]').forEach(radio => {
  radio.addEventListener('change', () => {
    rangeInput.style.display = radio.value === 'range' ? 'block' : 'none';
  });
});

async function loadFile(file) {
  if (!file || file.type !== 'application/pdf') return;
  pdfFile = file;
  const bytes = await file.arrayBuffer();
  const pdf = await PDFLib.PDFDocument.load(bytes);
  fileInfo.textContent = `${file.name} — ${pdf.getPageCount()} pages`;
  options.style.display = 'block';
  dropZone.style.display = 'none';
}

function parseRanges(str, total) {
  const pages = new Set();
  str.split(',').forEach(part => {
    part = part.trim();
    if (part.includes('-')) {
      let [a, b] = part.split('-').map(Number);
      for (let i = a; i <= Math.min(b, total); i++) pages.add(i);
    } else {
      const n = parseInt(part);
      if (n >= 1 && n <= total) pages.add(n);
    }
  });
  return [...pages].sort((a, b) => a - b);
}

async function downloadPdf(doc, name) {
  const bytes = await doc.save();
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

splitBtn.addEventListener('click', async () => {
  if (!pdfFile) return;
  splitBtn.textContent = 'Splitting...';
  splitBtn.disabled = true;

  try {
    const bytes = await pdfFile.arrayBuffer();
    const pdf = await PDFLib.PDFDocument.load(bytes);
    const total = pdf.getPageCount();
    const mode = document.querySelector('input[name="splitMode"]:checked').value;

    if (mode === 'all') {
      for (let i = 0; i < total; i++) {
        const doc = await PDFLib.PDFDocument.create();
        const [page] = await doc.copyPages(pdf, [i]);
        doc.addPage(page);
        await downloadPdf(doc, `page-${i + 1}.pdf`);
      }
    } else {
      const pages = parseRanges(rangeInput.value, total);
      if (pages.length === 0) { alert('Invalid range.'); return; }
      const doc = await PDFLib.PDFDocument.create();
      const copied = await doc.copyPages(pdf, pages.map(p => p - 1));
      copied.forEach(p => doc.addPage(p));
      await downloadPdf(doc, 'split.pdf');
    }
  } catch(e) {
    alert('Error. Make sure the PDF is not password protected.');
  }

  splitBtn.textContent = 'Split PDF';
  splitBtn.disabled = false;
});
</script>
