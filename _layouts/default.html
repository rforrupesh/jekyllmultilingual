<!DOCTYPE html>
<html lang="{{ page.lang | default: 'es' }}" dir="{{ site.data.translations[page.lang].dir | default: 'ltr' }}">
<head>
  {% include head.html %}

</head>
<body>
  {% include nav.html %}

  <div class="infoContent">
    {{ content }}
  </div>

  {% include footer.html %}

  <script>
    const dropdown = document.querySelector('.lang-dropdown');
    const btn = document.querySelector('.lang-btn');
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const open = dropdown.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', function() {
      dropdown.classList.remove('open');
      btn.setAttribute('aria-expanded', false);
    });
  </script>


  
<script src="//instant.page/5.2.0" type="module" integrity="sha384-JnE3e3Accept8g96msvT95as+rY79+4T9/M08zS11gW42d++nSxh6F8QeRrc/B0U" crossorigin="anonymous"></script>

  
</body>
</html>
