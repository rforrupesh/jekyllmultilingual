---
layout: blog
title: "Category Archive"
---

<h1 id="category-title">Category: Loading...</h1>

<!-- Agar aapka main layout post-list wrapper use karta hai toh thoda design theek kar sakte hain -->
<ul id="post-list" style="list-style: none; padding: 0;">
  {% for post in site.posts %}
    {% for cat in post.categories %}
      <!-- Humne data-category attribute add kiya hai jisme slugify category store hogi -->
      <li class="post-item" data-category="{{ cat | slugify }}" style="display: none; margin-bottom: 10px;">
        <a href="{{ post.url | relative_url }}" style="font-weight: bold; font-size: 1.2rem; text-decoration: none;">{{ post.title }}</a> 
        <span style="color: #666; font-size: 0.9rem;">— {{ post.date | date: "%b %d, %Y" }}</span>
      </li>
    {% endfor %}
  {% endfor %}
</ul>

<div id="no-posts" style="display: none; color: #777; font-style: italic;">
  Is category me koi post nahi mila.
</div>

<script>
  // 1. URL parameters se category read karein
  const urlParams = new URLSearchParams(window.location.search);
  let currentCat = urlParams.get('c');

  if (currentCat) {
    // 2. Browser text ko clean karke slug me badlein (spaces to hyphens, lowercase)
    currentCat = currentCat.trim().toLowerCase().replace(/[^a-z0-9 -]/g, '').replace(/\s+/g, '-');

    // Heading update karein (Thoda sundar dekhne ke liye capitalization handle karein)
    const displayTitle = currentCat.replace(/-/g, ' ').toUpperCase();
    document.getElementById('category-title').innerText = "Category: " + displayTitle;
    
    // 3. Sabhi post items ko loop karke data attribute match karein
    const posts = document.querySelectorAll('.post-item');
    let foundCount = 0;

    posts.forEach(post => {
      if (post.getAttribute('data-category') === currentCat) {
        post.style.display = 'block';
        foundCount++;
      }
    });

    // 4. Agar koi post na mile toh fallback message dikhayein
    if (foundCount === 0) {
      document.getElementById('no-posts').style.display = 'block';
    }
  } else {
    document.getElementById('category-title').innerText = "Koi category select nahi ki gayi hai.";
  }
</script>
